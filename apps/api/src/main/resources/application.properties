server.port=${STOREPULSE_SERVER_PORT:8080}

spring.datasource.url=${STOREPULSE_DB_URL:jdbc:postgresql://localhost:5432/storepulse}
spring.datasource.username=${STOREPULSE_DB_USERNAME:storepulse}
spring.datasource.password=${STOREPULSE_DB_PASSWORD:storepulse}
spring.datasource.driver-class-name=${STOREPULSE_DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

storepulse.import.storage-dir=${STOREPULSE_IMPORT_STORAGE_DIR:./data/imports}
storepulse.analytics.min-daily-revenue=${STOREPULSE_MIN_DAILY_REVENUE:50.00}
storepulse.analytics.min-average-basket=${STOREPULSE_MIN_AVERAGE_BASKET:10.00}
storepulse.scheduler.analytics-recompute-delay=${STOREPULSE_ANALYTICS_RECOMPUTE_DELAY:PT6H}
storepulse.auth.bootstrap-username=${STOREPULSE_BOOTSTRAP_USERNAME:admin}
storepulse.auth.bootstrap-password=${STOREPULSE_BOOTSTRAP_PASSWORD:storepulse-admin}
storepulse.auth.jwt-secret=${STOREPULSE_JWT_SECRET:U3RvcmVQdWxzZVN0b3JlUHVsc2VTdG9yZVB1bHNlU2VjcmV0MTIzNDU2}
storepulse.auth.jwt-expiration=${STOREPULSE_JWT_EXPIRATION:PT12H}
storepulse.auth.allowed-origin=${STOREPULSE_ALLOWED_ORIGIN:http://localhost:5173}
